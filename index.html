<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>FRANK'S VILLA</title>
    <script src="script/aframe.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
    

    <style>
      #ui {
        position: fixed;
        top: 10px;
        right: 10px;
        z-index: 999;
        pointer-events: none;
      }

      .teleportBtn {
        display: block;
        width: 35px;
        height: 35px;
        margin-bottom: 5px;
        border: 2px solid white;
        background: transparent;
        color: white;
        font-size: 14px;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
        pointer-events: auto;
      }

      .teleportBtn:hover {
        background: rgba(255, 255, 255, 0.1);
      }
    </style>
  </head>

  <body>
    <a-scene>
      <!-- UI Buttons -->
      <div id="ui">
        <button id="upBtn" class="teleportBtn">↑</button>
        <button id="downBtn" class="teleportBtn">↓</button>
      </div>

      <!-- Camera Rig -->
      <a-entity id="cameraRig" position="0 80 300" wasd-controls="acceleration: 2200">
        <a-camera look-controls="pointerLockEnabled: false"></a-camera>
      </a-entity>

      <!-- ASSETS -->
      <a-assets>
        <img id="skyTexture" src="textures/sky background.jpeg" />
        <img id="fenceTexture" src="textures/concrete.jpeg" />

        <a-asset-item id="villa" src="https://github.com/kenziegunnerfx-del/Examination/releases/download/v1.0/lastvilla.gltf"></a-asset-item>
        <a-asset-item id="fence12" src="https://github.com/kenziegunnerfx-del/Examination/releases/download/v1.0/fence.gltf"></a-asset-item>
        <a-asset-item id="pool" src="https://github.com/kenziegunnerfx-del/Examination/releases/download/v1.0/pool.gltf"></a-asset-item>
        <a-asset-item id="wyvernCar" src="https://github.com/kenziegunnerfx-del/Examination/releases/download/v1.0/othercar.gltf"></a-asset-item>
        <a-asset-item id="luxuryCar" src="https://github.com/kenziegunnerfx-del/Examination/releases/download/v1.0/luxurycar.gltf"></a-asset-item>
        <a-asset-item id="pothosPlant" src="https://github.com/kenziegunnerfx-del/Examination/releases/download/v1.0/plants.gltf"></a-asset-item>

      </a-assets>

      <!-- Models -->
          <a-entity gltf-model="#villa" position="-150 2 -800" scale="40 40 40" ></a-entity>
          <a-entity gltf-model="#pool" position="180 30 -800" scale="16 16 16"></a-entity>
          <a-entity gltf-model="#wyvernCar" position="-400 0 -400" scale="8 8 8" rotation="0 0 0"></a-entity>
          <a-entity gltf-model="#luxuryCar" position="-320 0 -300" scale="25 25 25" rotation="0 90 0"></a-entity>

          
          <!-- Plants around the fence outside -->
          <a-entity gltf-model="#pothosPlant" position="-650 0 -200" scale="75 75 75" rotation="0 45 0"></a-entity>
          <a-entity gltf-model="#pothosPlant" position="650 0 -200" scale="75 75 75" rotation="0 -45 0"></a-entity>
          <a-entity gltf-model="#pothosPlant" position="-650 0 -400" scale="75 75 75" rotation="0 60 0"></a-entity>
          <a-entity gltf-model="#pothosPlant" position="650 0 -400" scale="75 75 75" rotation="0 -60 0"></a-entity>
          <a-entity gltf-model="#pothosPlant" position="-650 0 -600" scale="75 75 75" rotation="0 75 0"></a-entity>
          <a-entity gltf-model="#pothosPlant" position="650 0 -600" scale="75 75 75" rotation="0 -75 0"></a-entity>
          <a-entity gltf-model="#pothosPlant" position="-650 0 -800" scale="75 75 75" rotation="0 90 0"></a-entity>
          <a-entity gltf-model="#pothosPlant" position="650 0 -800" scale="75 75 75" rotation="0 -90 0"></a-entity>
          <a-entity gltf-model="#pothosPlant" position="-650 0 -1000" scale="75 75 75" rotation="0 105 0"></a-entity>
          <a-entity gltf-model="#pothosPlant" position="650 0 -1000" scale="75 75 75" rotation="0 -105 0"></a-entity>
          <a-entity gltf-model="#pothosPlant" position="-650 0 -1200" scale="75 75 75" rotation="0 120 0"></a-entity>
          <a-entity gltf-model="#pothosPlant" position="650 0 -1200" scale="75 75 75" rotation="0 -120 0"></a-entity>
          <a-entity gltf-model="#pothosPlant" position="-650 0 -1400" scale="75 75 75" rotation="0 135 0"></a-entity>
          <a-entity gltf-model="#pothosPlant" position="650 0 -1400" scale="75 75 75" rotation="0 -135 0"></a-entity>
          <a-entity gltf-model="#pothosPlant" position="0 0 -150" scale="75 75 75" rotation="0 0 0"></a-entity>
          <a-entity gltf-model="#pothosPlant" position="-200 0 -150" scale="75 75 75" rotation="0 20 0"></a-entity>
          <a-entity gltf-model="#pothosPlant" position="200 0 -150" scale="75 75 75" rotation="0 -20 0"></a-entity>
          <a-entity gltf-model="#pothosPlant" position="-400 0 -150" scale="75 75 75" rotation="0 40 0"></a-entity>
          <a-entity gltf-model="#pothosPlant" position="400 0 -150" scale="75 75 75" rotation="0 -40 0"></a-entity>
          <a-entity gltf-model="#pothosPlant" position="0 0 -1450" scale="75 75 75" rotation="0 180 0"></a-entity>
          <a-entity gltf-model="#pothosPlant" position="-200 0 -1450" scale="75 75 75" rotation="0 160 0"></a-entity>
          <a-entity gltf-model="#pothosPlant" position="200 0 -1450" scale="75 75 75" rotation="0 -160 0"></a-entity>
          <a-entity gltf-model="#pothosPlant" position="-400 0 -1450" scale="75 75 75" rotation="0 140 0"></a-entity>
          <a-entity gltf-model="#pothosPlant" position="400 0 -1450" scale="75 75 75" rotation="0 -140 0"></a-entity>

      <!-- Sky -->
      <a-sky rotation="0 0 0" position="0 90 0" src="#skyTexture" radius="9000"></a-sky>

      <!-- Tiled floor inside fence -->
      <a-plane 
        rotation="-90 0 0" 
        position="0 3 -800" 
        width="1130" 
        height="1200" 
        src="textures/tiles.jpeg" 
        repeat="30 30">
      </a-plane>

      <!-- Ground (grass outside fence) --> 
      <a-plane rotation="-90 -10 0" width="5000" position="0 1 0" height="5000" src="textures/grass1.jpeg" repeat="100 100"></a-plane> 

      <!-- Main Gate -->
      <a-box position="65 2 -180" width="90" height="105" depth="5" src="textures/maingate.JPG"></a-box> 

      <!-- Front Wall -->
      <a-box position="0 2 -200" width="1130" height="100" depth="2.5" src="#fenceTexture"></a-box>

      <!-- Back Wall -->
      <a-box position="0 2 -1400" width="1130" height="100" depth="2.5" src="#fenceTexture"></a-box>

      <!-- Left Wall -->
      <a-box position="-565 2 -800" width="2.5" height="100" depth="1200" src="#fenceTexture"></a-box>

      <!-- Right Wall -->
      <a-box position="565 2 -800" width="2.5" height="100" depth="1200" src="#fenceTexture"></a-box>

    </a-scene>
    <script>
      document.getElementById('upBtn').addEventListener('click', function () {
        const rig = document.getElementById('cameraRig');
        rig.setAttribute('position', '0 200 -1100');
      });

      document.getElementById('downBtn').addEventListener('click', function () {
        const rig = document.getElementById('cameraRig');
        rig.setAttribute('position', '0 80 300');
      });
    </script>
  </body>
</html>
